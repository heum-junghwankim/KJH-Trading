<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 하이칸아시 핵심 구조 요약</title>
  <desc id="desc">하이칸아시 버전의 비정상 캔들, 다이버전스 프리뷰와 확정, ATR 배경, 간소화된 리포트 구조를 카드형으로 설명하는 SVG</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff9f1"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5b6c7c; }
      .section { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #48617a; letter-spacing: 0.08em; }
      .cardTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2a3c4f; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5a6c7d; }
      .tiny { font: 600 12px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #607182; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#eef2f7"/>
  <rect x="24" y="24" width="1352" height="932" rx="28" fill="url(#bg)" stroke="#d7e0ea"/>

  <text x="60" y="86" class="title">비정상 가격 추적 (하이칸아시) · 핵심 구조</text>
  <text x="60" y="118" class="subtitle">현재 버전은 HA 기준 자리와 감시를 더 부드럽게 읽기 위한 관찰 중심 구조입니다. VWAP, 기준 발생, 스윕확인은 제외되어 있습니다.</text>

  <rect x="60" y="156" width="620" height="760" rx="24" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="92" y="194" class="section">SIGNAL FLOW</text>
  <text x="92" y="228" class="cardTitle">지금은 감시 흐름에 집중</text>

  <rect x="92" y="260" width="556" height="118" rx="18" fill="#fff4ec" stroke="#efcdc0"/>
  <circle cx="132" cy="319" r="22" fill="#ff8c3c"/>
  <text x="132" y="325" class="body center" fill="#ffffff">0</text>
  <text x="172" y="306" class="body">비정상 캔들</text>
  <text x="172" y="334" class="small">cRSI 극단과 볼린저 몸통 이탈이 겹치면 자리 후보를 먼저 잡습니다.</text>
  <text x="172" y="358" class="tiny">HA 차트에 올리면 HA 가격 기준으로 그대로 계산됩니다.</text>

  <rect x="92" y="396" width="556" height="136" rx="18" fill="#eef7ff" stroke="#c9dff3"/>
  <circle cx="132" cy="464" r="18" fill="#3b82f6" fill-opacity="0.3"/>
  <polygon points="126,494 138,470 150,494" fill="#2563eb"/>
  <text x="172" y="444" class="body">다이버전스 프리뷰 / 확정</text>
  <text x="172" y="472" class="small">연한 원형은 현재 봉 기준 프리뷰, 진한 삼각형은 피벗 확정 뒤의 정식 힌트입니다.</text>
  <text x="172" y="496" class="tiny">현재 기본 Pivot Right는 1이라 예전보다 확정 속도가 빠릅니다.</text>
  <text x="172" y="520" class="tiny">리포트와 ATR 배경은 확정 다이버전스만 사용합니다.</text>

  <rect x="92" y="550" width="556" height="118" rx="18" fill="#eefcf3" stroke="#cbe5d2"/>
  <circle cx="132" cy="609" r="22" fill="#2ca46f"/>
  <text x="132" y="615" class="body center" fill="#ffffff">2</text>
  <text x="172" y="596" class="body">ATR 배경 / ATR 강화</text>
  <text x="172" y="624" class="small">다이버전스 또는 비정상 캔들 이후 실제 후속 이동이 붙었는지 감시합니다.</text>
  <text x="172" y="648" class="tiny">강화 배경은 더 큰 이동이 붙은 상태이고, 리포트 강도도 함께 올려 줍니다.</text>

  <rect x="92" y="686" width="556" height="118" rx="18" fill="#fff8ea" stroke="#ead8ab"/>
  <text x="118" y="722" class="body">현재 빠진 것</text>
  <text x="118" y="750" class="small">VWAP 필터, 기준 발생, 스윕확인, 박스 기반 후보 유지 로직은 이 버전에서 제거되었습니다.</text>
  <text x="118" y="774" class="tiny">즉 실행 단계보다 관찰 품질을 높이는 데 초점을 맞춘 상태입니다.</text>

  <rect x="92" y="822" width="556" height="62" rx="18" fill="#f7fbff" stroke="#d8e3ed"/>
  <text x="118" y="858" class="small">읽는 순서: 비정상 캔들 → 프리뷰 원형 → 확정 삼각형 → ATR 배경 → 리포트 종료 전까지 관찰</text>

  <rect x="712" y="156" width="628" height="352" rx="24" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="744" y="194" class="section">REPORT</text>
  <text x="744" y="228" class="cardTitle">리포트는 감시 상태만 간단히 압축</text>

  <rect x="744" y="260" width="564" height="84" rx="16" fill="#fff6ed" stroke="#efd7c0"/>
  <text x="768" y="294" class="small">리포트 행은 `비정상 시작`, `비정상 유지`, `다이버전스`, `ATR 배경`, `ATR 강화`, `시작 시간`, `종료 시간`만 남습니다.</text>
  <text x="768" y="320" class="small">예전의 포지션, 기준, 후보, 스윕 단계는 이 버전에서 제거되었습니다.</text>

  <rect x="744" y="362" width="564" height="110" rx="16" fill="#eef7ff" stroke="#d2e4f3"/>
  <text x="768" y="396" class="body">종료 기준</text>
  <text x="768" y="424" class="small">롱 반등 감시 중 숏 쪽 이벤트가 하나라도 나오면 롱 감시는 바로 종료됩니다.</text>
  <text x="768" y="448" class="small">숏 반등 감시도 반대로 동일하게 종료됩니다.</text>

  <rect x="712" y="534" width="628" height="382" rx="24" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="744" y="572" class="section">PRACTICAL USE</text>
  <text x="744" y="606" class="cardTitle">실전에서는 캔들 버전과 나란히 비교</text>

  <rect x="744" y="638" width="564" height="94" rx="16" fill="#f5fffa" stroke="#cbe8d6"/>
  <text x="768" y="674" class="body">캔들 버전</text>
  <text x="768" y="702" class="small">자리, 실행 구조, 기준 발생, 스윕확인처럼 더 구체적인 실행 흐름을 봅니다.</text>

  <rect x="744" y="748" width="564" height="94" rx="16" fill="#f6f8ff" stroke="#d7dcfb"/>
  <text x="768" y="784" class="body">하이칸아시 버전</text>
  <text x="768" y="812" class="small">같은 구간을 더 부드럽게 다시 계산해 감시 품질과 노이즈 수준을 비교합니다.</text>

  <rect x="744" y="858" width="564" height="40" rx="14" fill="#fffdf8" stroke="#e6dccb"/>
  <text x="768" y="883" class="tiny">요약: 캔들 버전은 실행 구조, 하이칸아시 버전은 정제된 감시 흐름으로 읽으면 편합니다.</text>
</svg>
