<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 캔들 핵심 구조 요약</title>
  <desc id="desc">비정상 가격 추적 캔들의 0단계부터 4단계까지의 흐름, 진입 후보 점수 구조, 리포트 포지션 기준을 카드형으로 요약한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff8ef"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5b6c7c; }
      .section { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #48617a; letter-spacing: 0.08em; }
      .cardTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2a3c4f; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5a6c7d; }
      .tiny { font: 600 12px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #607182; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <rect width="1400" height="1120" fill="#eef2f7"/>
  <rect x="24" y="24" width="1352" height="1072" rx="28" fill="url(#bg)" stroke="#d7e0ea"/>

  <text x="60" y="86" class="title">비정상 가격 추적 (캔들) · 핵심 구조</text>
  <text x="60" y="118" class="subtitle">현재 스크립트는 자리, 감시, 진입 후보, 스윕, 리포트를 한 흐름으로 읽게 설계되어 있습니다. 모든 신호는 봉 마감 후 확정됩니다.</text>

  <rect x="60" y="156" width="600" height="900" rx="24" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="92" y="194" class="section">SIGNAL FLOW</text>
  <text x="92" y="228" class="cardTitle">0단계부터 4단계까지 읽는 순서</text>

  <rect x="92" y="258" width="536" height="118" rx="18" fill="#fff4ec" stroke="#efcdc0"/>
  <circle cx="130" cy="317" r="22" fill="#ff8c3c"/>
  <text x="130" y="323" class="body center" fill="#ffffff">0</text>
  <text x="170" y="304" class="body">비정상 캔들</text>
  <text x="170" y="332" class="small">cRSI 극단과 볼린저 몸통 이탈로 자리 후보를 먼저 잡습니다.</text>
  <text x="170" y="356" class="tiny">과매수는 주황, 과매도는 하늘 색으로 표시됩니다.</text>

  <rect x="92" y="394" width="536" height="118" rx="18" fill="#eef7ff" stroke="#c9dff3"/>
  <circle cx="130" cy="453" r="22" fill="#57a9e6"/>
  <text x="130" y="459" class="body center" fill="#ffffff">1</text>
  <text x="170" y="440" class="body">RSI 다이버전스</text>
  <text x="170" y="468" class="small">피벗 확정 후 효율 저하를 힌트로 붙입니다.</text>
  <text x="170" y="492" class="tiny">삼각형과 다이버전스 존은 선택적으로 함께 표시됩니다.</text>

  <rect x="92" y="530" width="536" height="118" rx="18" fill="#eefcf3" stroke="#cbe5d2"/>
  <circle cx="130" cy="589" r="22" fill="#2ca46f"/>
  <text x="130" y="595" class="body center" fill="#ffffff">2</text>
  <text x="170" y="576" class="body">ATR 배경 / ATR 강화</text>
  <text x="170" y="604" class="small">자리 이후 실제 후속 이동이 붙으면 감시 배경이 켜집니다.</text>
  <text x="170" y="628" class="tiny">강한 배경은 리포트 종료 기준과 눌림 보너스 계산에도 쓰입니다.</text>

  <rect x="92" y="666" width="536" height="118" rx="18" fill="#f4fff5" stroke="#cfe6d2"/>
  <circle cx="130" cy="725" r="22" fill="#0c7a2b"/>
  <text x="130" y="731" class="body center" fill="#ffffff">3</text>
  <text x="170" y="712" class="body">진입 후보</text>
  <text x="170" y="740" class="small">통합 점수와 필터를 통과한 첫 봉에만 원형 시그널이 찍힙니다.</text>
  <text x="170" y="764" class="tiny">이때 기준봉 박스가 생성되고, 이후 스윕 감시는 이 박스만 사용합니다.</text>

  <rect x="92" y="802" width="536" height="118" rx="18" fill="#fff3f3" stroke="#efcdcd"/>
  <circle cx="130" cy="861" r="22" fill="#c92f2f"/>
  <text x="130" y="867" class="body center" fill="#ffffff">4</text>
  <text x="170" y="848" class="body">스윕 확인</text>
  <text x="170" y="876" class="small">진입 후보 박스를 실제로 스윕한 뒤 다음 봉 재확인까지 붙은 상태입니다.</text>
  <text x="170" y="900" class="tiny">스윕 봉은 밝은 봉 색, 다음 봉은 다이아몬드로 표시됩니다.</text>

  <rect x="92" y="938" width="536" height="86" rx="18" fill="#fff9ea" stroke="#ead8ab"/>
  <text x="112" y="974" class="body">핵심 해석</text>
  <text x="112" y="1002" class="small">비정상 캔들은 자리, 다이버전스는 힌트, ATR 배경은 감시, 진입 후보는 첫 실행, 스윕은 후속 확인으로 읽으면 됩니다.</text>

  <rect x="692" y="156" width="448" height="410" rx="24" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="724" y="194" class="section">ENTRY SCORE</text>
  <text x="724" y="228" class="cardTitle">진입 후보는 통합 점수로 결정</text>

  <rect x="724" y="258" width="384" height="136" rx="16" fill="#eef7ff" stroke="#d2e4f3"/>
  <text x="748" y="290" class="body">세팅 점수</text>
  <text x="748" y="318" class="small">비정상 캔들 `+2`, 다이버전스 `+2`, ATR 배경 `+1`, ATR 강화 `+1`</text>
  <text x="748" y="342" class="small">보조 신호 `+1`, 강한 배경 보너스, 배경 근접 주문량 보너스</text>
  <text x="748" y="366" class="small">ATR 강화 연속 눌림 보너스는 `2~4봉` 증가, `5~6봉` 유지, 이후 감점</text>

  <rect x="724" y="412" width="384" height="112" rx="16" fill="#f4fff5" stroke="#d4e8d6"/>
  <text x="748" y="444" class="body">확인 점수</text>
  <text x="748" y="472" class="small">거래량 확인 `+2`, 봉 방향 `+1`, 직전 종가 대비 진행 `+1`</text>
  <text x="748" y="496" class="small">cRSI 방향 `+1`, MFI 방향 `+1`</text>

  <rect x="692" y="594" width="448" height="276" rx="24" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="724" y="632" class="section">REPORT</text>
  <text x="724" y="666" class="cardTitle">리포트는 현재 흐름을 압축해서 보여줌</text>

  <rect x="724" y="694" width="384" height="76" rx="16" fill="#fff6ed" stroke="#efd7c0"/>
  <text x="748" y="726" class="small">리포트는 첫 이벤트에서 시작하고, 반대 방향 `ATR 강화`가 나오면 종료됩니다.</text>
  <text x="748" y="750" class="small">시간, 종가 변화, 최대 유리, 최대 불리, 포지션을 함께 보여줍니다.</text>

  <rect x="724" y="788" width="384" height="54" rx="14" fill="#f1f6fb" stroke="#d8e3ed"/>
  <text x="748" y="822" class="small">포지션: `OFF -> 관찰 -> 후보 -> 진입 -> 스윕`</text>

  <rect x="724" y="854" width="384" height="78" rx="14" fill="#f7fbff" stroke="#d8e3ed"/>
  <text x="748" y="886" class="small">하단 둘째 줄 점수 안내 예시</text>
  <text x="748" y="914" class="body">`8점 미만 관찰 / 8~9점 후보 / 10점 이상 진입`</text>

  <rect x="692" y="888" width="448" height="168" rx="24" fill="#fffdf8" stroke="#e6dccb"/>
  <text x="724" y="926" class="section">FILTERS</text>
  <text x="724" y="960" class="cardTitle">후보 남발 방지 장치</text>
  <text x="724" y="994" class="small">`동일 방향 신호 쿨다운`, `반대 배경 전환 후 방향 전환`, `총 거래량 MA 미만 신호 차단`</text>
  <text x="724" y="1018" class="small">`비정상 주문량 발생 필수`, `강한 추세 연장 추가 진입 차단`, 눌림 보너스 1회 소진</text>
  <text x="724" y="1042" class="tiny">표 하단 첫 줄에는 `경계` 문구가 보일 수 있지만, 현재 코드가 계산하는 포지션 값은 `OFF / 관찰 / 후보 / 진입 / 스윕`입니다.</text>
</svg>
