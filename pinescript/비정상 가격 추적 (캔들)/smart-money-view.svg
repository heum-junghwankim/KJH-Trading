<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 캔들 세력 관점 다이어그램</title>
  <desc id="desc">비정상 캔들, 다이버전스, ATR 배경, Strong Long/Short를 세력 관점으로 해석한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8f2"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #122033; }
      .subtitle { font: 500 17px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #556678; }
      .cardTitle { font: 700 24px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .label { font: 700 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2f4d6c; letter-spacing: 0.08em; }
      .body { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #26384a; }
      .small { font: 500 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #4d6070; }
      .note { font: 700 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #6d4d14; }
    </style>
  </defs>

  <rect width="1200" height="980" fill="#eef2f8"/>
  <rect x="24" y="24" width="1152" height="932" rx="28" fill="url(#bg)" stroke="#dae3ec"/>

  <text x="60" y="82" class="title">비정상 가격 추적 (캔들) · 세력 관점</text>
  <text x="60" y="114" class="subtitle">비정상 캔들은 스윕, 다이버전스는 효율 저하, ATR 배경은 후속 displacement를 압축해서 보여줍니다</text>

  <rect x="60" y="154" width="500" height="300" rx="24" fill="#fff1f1" stroke="#efc2c6"/>
  <text x="92" y="192" class="label">UPPER SWEEP</text>
  <text x="92" y="226" class="cardTitle">비정상 과매수 캔들</text>
  <rect x="92" y="248" width="186" height="170" rx="18" fill="#ffffff" opacity="0.84" stroke="#f2d7da"/>
  <line x1="122" y1="384" x2="122" y2="314" stroke="#cb4456" stroke-width="8" stroke-linecap="round"/>
  <rect x="100" y="334" width="44" height="74" rx="8" fill="#e85d70"/>
  <line x1="186" y1="392" x2="186" y2="338" stroke="#cb4456" stroke-width="8" stroke-linecap="round"/>
  <rect x="164" y="356" width="44" height="52" rx="8" fill="#f59aa5"/>
  <line x1="248" y1="394" x2="248" y2="304" stroke="#cb4456" stroke-width="8" stroke-linecap="round"/>
  <rect x="226" y="324" width="44" height="78" rx="8" fill="#d74357"/>
  <text x="308" y="274" class="body">세력 해석</text>
  <text x="308" y="302" class="small">전고점 위, 저항 돌파 직후라면</text>
  <text x="308" y="324" class="small">위 유동성 스윕과 분산 후보</text>
  <text x="308" y="360" class="body">후속 확인</text>
  <text x="308" y="388" class="small">약세 ATR 배경, 약세 다이버전스</text>
  <text x="308" y="410" class="small">고가 미유지 시 Short 후보 강화</text>

  <rect x="640" y="154" width="500" height="300" rx="24" fill="#eef9ff" stroke="#c4e1f5"/>
  <text x="672" y="192" class="label">LOWER SWEEP</text>
  <text x="672" y="226" class="cardTitle">비정상 과매도 캔들</text>
  <rect x="672" y="248" width="186" height="170" rx="18" fill="#ffffff" opacity="0.84" stroke="#d6e7f4"/>
  <line x1="702" y1="306" x2="702" y2="400" stroke="#2589c4" stroke-width="8" stroke-linecap="round"/>
  <rect x="680" y="308" width="44" height="74" rx="8" fill="#55b5ea"/>
  <line x1="766" y1="316" x2="766" y2="400" stroke="#2589c4" stroke-width="8" stroke-linecap="round"/>
  <rect x="744" y="328" width="44" height="52" rx="8" fill="#92d6f7"/>
  <line x1="828" y1="292" x2="828" y2="404" stroke="#2589c4" stroke-width="8" stroke-linecap="round"/>
  <rect x="806" y="318" width="44" height="78" rx="8" fill="#2f9ed8"/>
  <text x="888" y="274" class="body">세력 해석</text>
  <text x="888" y="302" class="small">전저점 아래, 지지 이탈 직후라면</text>
  <text x="888" y="324" class="small">투매 스윕과 바닥 흡수 후보</text>
  <text x="888" y="360" class="body">후속 확인</text>
  <text x="888" y="388" class="small">강세 ATR 배경, 강세 다이버전스</text>
  <text x="888" y="410" class="small">저가 회복 시 Long 후보 강화</text>

  <rect x="60" y="492" width="1080" height="206" rx="26" fill="#ffffff" stroke="#d3dce6"/>
  <text x="92" y="534" class="label">FOLLOW-THROUGH</text>
  <text x="92" y="568" class="cardTitle">다이버전스 + ATR 배경 = 꼬리가 아니라 후속 파동 확인</text>

  <rect x="92" y="598" width="286" height="64" rx="16" fill="#fff7d9" stroke="#f0d57f"/>
  <text x="114" y="636" class="body">1. 비정상 캔들: 스윕 또는 과열 분출</text>

  <rect x="456" y="598" width="286" height="64" rx="16" fill="#eef6ff" stroke="#c7ddf7"/>
  <text x="478" y="636" class="body">2. 다이버전스: 가격 효율 둔화 또는 흡수</text>

  <rect x="820" y="598" width="286" height="64" rx="16" fill="#edf8f1" stroke="#c6e8d1"/>
  <text x="842" y="636" class="body">3. ATR 배경: 실제 displacement 시작</text>

  <rect x="60" y="736" width="500" height="118" rx="24" fill="#ebfff3" stroke="#c3e9d0"/>
  <text x="92" y="776" class="cardTitle">Strong Long</text>
  <text x="92" y="806" class="small">아래 유동성 회수 + 강세 배경 + 거래량 확인</text>
  <text x="92" y="828" class="small">MA 복귀가 함께 겹친 자리</text>

  <rect x="640" y="736" width="500" height="118" rx="24" fill="#fff1f1" stroke="#efc2c6"/>
  <text x="672" y="776" class="cardTitle">Strong Short</text>
  <text x="672" y="806" class="small">위 유동성 회수 + 약세 배경 + 거래량 확인</text>
  <text x="672" y="828" class="small">MA 이탈이 함께 겹친 자리</text>

  <text x="60" y="902" class="note">핵심: Strong 신호도 상위 추세와 반대면 짧은 반등·반락으로 끝날 수 있으니 무효화 기준을 먼저 잡아야 합니다</text>
</svg>
