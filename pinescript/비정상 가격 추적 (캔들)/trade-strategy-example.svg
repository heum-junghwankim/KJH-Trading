<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 캔들 실전 운용 흐름</title>
  <desc id="desc">비정상 가격 추적 캔들의 롱과 숏 운용 흐름, 스윕 확인, 후보 남발 방지 필터를 정리한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8ef"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .subtitle { font: 500 17px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5c6d7d; }
      .section { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #49627a; letter-spacing: 0.08em; }
      .panelTitle { font: 700 24px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .body { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #283a4d; }
      .small { font: 500 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5a6c7d; }
      .tiny { font: 600 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #607182; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <rect width="1200" height="1180" fill="#eef2f7"/>
  <rect x="24" y="24" width="1152" height="1132" rx="28" fill="url(#bg)" stroke="#d7e0ea"/>

  <text x="60" y="86" class="title">비정상 가격 추적 (캔들) · 실전 운용 흐름</text>
  <text x="60" y="118" class="subtitle">롱과 숏은 같은 구조를 반대로 읽습니다. 핵심은 `자리 -> 감시 -> 진입 후보 -> 스윕`, 그리고 리포트 `포지션` 확인입니다.</text>

  <rect x="60" y="154" width="1080" height="392" rx="26" fill="#eef8ff" stroke="#c9dff3"/>
  <text x="92" y="192" class="section">LONG FLOW</text>
  <text x="92" y="226" class="panelTitle">롱은 하단 흡수, 감시 배경, 첫 후보, 스윕 재확인 순서로 읽음</text>

  <rect x="92" y="258" width="234" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="122" cy="318" r="12" fill="#63dbff"/>
  <text x="148" y="304" class="body">1. 자리</text>
  <text x="148" y="332" class="small">과매도 비정상 캔들</text>
  <text x="148" y="356" class="small">강세 다이버전스</text>

  <rect x="350" y="258" width="234" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="380" cy="318" r="12" fill="#2ca46f"/>
  <text x="406" y="304" class="body">2. 감시</text>
  <text x="406" y="332" class="small">강세 ATR 배경 진입</text>
  <text x="406" y="356" class="small">강한 배경이면 더 유리</text>

  <rect x="608" y="258" width="234" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="638" cy="318" r="12" fill="#0c7a2b"/>
  <text x="664" y="304" class="body">3. 후보</text>
  <text x="664" y="332" class="small">점수와 필터 통과</text>
  <text x="664" y="356" class="small">첫 롱 진입 후보 발생</text>

  <rect x="866" y="258" width="242" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="896" cy="318" r="12" fill="#00ff00"/>
  <text x="922" y="304" class="body">4. 스윕</text>
  <text x="922" y="332" class="small">후보 박스 하단 스윕</text>
  <text x="922" y="356" class="small">다음 봉 다이아몬드 확인</text>

  <line x1="326" y1="318" x2="350" y2="318" stroke="#8fb7cf" stroke-width="4" stroke-linecap="round"/>
  <line x1="584" y1="318" x2="608" y2="318" stroke="#8fb7cf" stroke-width="4" stroke-linecap="round"/>
  <line x1="842" y1="318" x2="866" y2="318" stroke="#8fb7cf" stroke-width="4" stroke-linecap="round"/>

  <rect x="92" y="408" width="1016" height="108" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="120" y="442" class="body">롱 체크포인트</text>
  <text x="120" y="470" class="small">`세팅 점수 >= 3`, `확인 점수 >= 4`, `통합 점수 >= 최소 진입 점수`, 반대 방향 점수보다 우위여야 합니다.</text>
  <text x="120" y="494" class="small">강한 강세 배경 연속 구간의 눌림은 보너스를 주지만, 보너스는 한 번 후보에 사용되면 소진됩니다.</text>

  <rect x="60" y="574" width="1080" height="392" rx="26" fill="#fff1f3" stroke="#efc7cd"/>
  <text x="92" y="612" class="section">SHORT FLOW</text>
  <text x="92" y="646" class="panelTitle">숏은 상단 분산, 감시 배경, 첫 후보, 스윕 재확인 순서로 읽음</text>

  <rect x="92" y="678" width="234" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="122" cy="738" r="12" fill="#ff8c3c"/>
  <text x="148" y="724" class="body">1. 자리</text>
  <text x="148" y="752" class="small">과매수 비정상 캔들</text>
  <text x="148" y="776" class="small">약세 다이버전스</text>

  <rect x="350" y="678" width="234" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="380" cy="738" r="12" fill="#d45757"/>
  <text x="406" y="724" class="body">2. 감시</text>
  <text x="406" y="752" class="small">약세 ATR 배경 진입</text>
  <text x="406" y="776" class="small">강한 배경이면 더 유리</text>

  <rect x="608" y="678" width="234" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="638" cy="738" r="12" fill="#a61f1f"/>
  <text x="664" y="724" class="body">3. 후보</text>
  <text x="664" y="752" class="small">점수와 필터 통과</text>
  <text x="664" y="776" class="small">첫 숏 진입 후보 발생</text>

  <rect x="866" y="678" width="242" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <circle cx="896" cy="738" r="12" fill="#ff0000"/>
  <text x="922" y="724" class="body">4. 스윕</text>
  <text x="922" y="752" class="small">후보 박스 상단 스윕</text>
  <text x="922" y="776" class="small">다음 봉 다이아몬드 확인</text>

  <line x1="326" y1="738" x2="350" y2="738" stroke="#c8a8ae" stroke-width="4" stroke-linecap="round"/>
  <line x1="584" y1="738" x2="608" y2="738" stroke="#c8a8ae" stroke-width="4" stroke-linecap="round"/>
  <line x1="842" y1="738" x2="866" y2="738" stroke="#c8a8ae" stroke-width="4" stroke-linecap="round"/>

  <rect x="92" y="828" width="1016" height="108" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
  <text x="120" y="862" class="body">숏 체크포인트</text>
  <text x="120" y="890" class="small">현재 숏 통합 점수가 롱보다 높고, 반대 방향 강한 배경이 없으며, 필수 주문량 조건도 충족해야 합니다.</text>
  <text x="120" y="914" class="small">강한 하락 연장 구간으로 판단되면 같은 리포트 안의 추가 숏 후보는 차단됩니다.</text>

  <rect x="60" y="994" width="1080" height="130" rx="24" fill="#fffdf8" stroke="#e6dccb"/>
  <text x="92" y="1032" class="section">COMMON RULES</text>
  <text x="92" y="1066" class="panelTitle">후보 남발을 줄이는 현재 코드의 공통 장치</text>
  <text x="92" y="1098" class="small">`동일 방향 신호 쿨다운`, `반대 배경 전환 후 방향 전환`, `이전 봉 배경 확인`, `총 거래량 MA 미만 신호 차단`</text>
  <text x="92" y="1122" class="small">리포트는 반대 방향 `ATR 강화` 전까지 유지되고, 포지션은 `OFF -> 관찰 -> 후보 -> 진입 -> 스윕` 순서로 읽습니다.</text>
</svg>
