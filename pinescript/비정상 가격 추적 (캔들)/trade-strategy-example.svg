<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 캔들 롱숏 전략 예시</title>
  <desc id="desc">비정상 과매수과매도 캔들, 다이버전스, ATR 배경, Strong Long and Short를 이용한 전략 예시</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8f2"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #15263a; }
      .subtitle { font: 500 17px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #58697b; }
      .panelTitle { font: 700 24px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .label { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2e4b69; letter-spacing: 0.06em; }
      .body { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #273a4d; }
      .small { font: 500 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #56687a; }
    </style>
  </defs>
  <rect width="1280" height="920" fill="#edf2f7"/>
  <rect x="24" y="24" width="1232" height="872" rx="28" fill="url(#bg)" stroke="#d6e0ea"/>
  <text x="60" y="82" class="title">비정상 가격 추적 (캔들) · 실전 롱/숏 전략 예시</text>
  <text x="60" y="114" class="subtitle">비정상 캔들 + 다이버전스 + ATR 배경 + Strong L/S 신호가 겹치는 자리만 실제 진입 후보로 압축합니다.</text>

  <rect x="60" y="150" width="540" height="690" rx="26" fill="#eef8ff" stroke="#c7dff5"/>
  <text x="96" y="190" class="label">LONG SETUP</text>
  <text x="96" y="226" class="panelTitle">과매도 스윕 + Strong Long에서 롱</text>
  <rect x="96" y="250" width="468" height="340" rx="18" fill="#ffffff" stroke="#d7e3ed"/>
  <rect x="236" y="370" width="140" height="180" fill="#e6f7ff"/>
  <polyline points="126,390 172,366 218,352 264,372 310,430 356,404 402,370 448,334 494,308 540,286" fill="none" stroke="#f2c94c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="136" y1="430" x2="136" y2="372" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="120" y="388" width="32" height="32" rx="6" fill="#df5c6c"/>
  <line x1="184" y1="414" x2="184" y2="358" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="168" y="372" width="32" height="32" rx="6" fill="#df5c6c"/>
