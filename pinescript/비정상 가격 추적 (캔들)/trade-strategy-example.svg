  <rect x="216" y="392" width="32" height="66" rx="6" fill="#53c7f2"/>
  <polygon points="232,492 220,510 244,510" fill="#33a8dc"/>
  <line x1="280" y1="430" x2="280" y2="360" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="264" y="376" width="32" height="42" rx="6" fill="#20a36c"/>
  <circle cx="280" cy="430" r="16" fill="#1d4ed8"/>
  <text x="275" y="436" class="body" fill="#ffffff">1</text>
  <line x1="328" y1="404" x2="328" y2="334" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="312" y="352" width="32" height="42" rx="6" fill="#20a36c"/>
  <line x1="376" y1="370" x2="376" y2="302" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="360" y="318" width="32" height="42" rx="6" fill="#20a36c"/>
  <line x1="424" y1="338" x2="424" y2="272" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="408" y="288" width="32" height="40" rx="6" fill="#20a36c"/>
  <circle cx="424" cy="288" r="16" fill="#16a34a"/>
  <text x="419" y="294" class="body" fill="#ffffff">2</text>
  <polygon points="232,528 220,544 244,544" fill="#38bdf8"/>
  <polygon points="328,336 316,320 340,320" fill="#22c55e"/>
  <rect x="374" y="260" width="140" height="28" rx="14" fill="#ebfff3" stroke="#bde8ce"/>
  <text x="392" y="279" class="small">Strong Long</text>
  <text x="142" y="528" class="small">강세 다이버전스</text>

  <text x="96" y="626" class="body">롱 전략</text>
  <text x="96" y="654" class="small">1. `비정상 과매도 캔들` + 강세 다이버전스 확인</text>
  <text x="96" y="676" class="small">2. `강세 ATR 배경` 또는 `Strong Long`에서 롱 매수</text>
  <text x="96" y="698" class="small">3. 상단 저항 또는 약세 배경 전환에서 롱 매도</text>
  <text x="96" y="720" class="small">4. 비정상 저점 재이탈이면 무효화</text>

  <rect x="680" y="150" width="540" height="690" rx="26" fill="#fff0f2" stroke="#efc3c9"/>
  <text x="716" y="190" class="label">SHORT SETUP</text>
  <text x="716" y="226" class="panelTitle">과매수 스윕 + Strong Short에서 숏</text>
  <rect x="716" y="250" width="468" height="340" rx="18" fill="#ffffff" stroke="#d7e3ed"/>
  <rect x="900" y="284" width="140" height="180" fill="#fff0e6"/>
  <polyline points="746,318 792,298 838,276 884,262 930,288 976,340 1022,374 1068,398 1114,420 1160,438" fill="none" stroke="#f2c94c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
