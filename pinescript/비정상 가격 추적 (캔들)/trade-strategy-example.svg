  <rect x="840" y="300" width="32" height="66" rx="6" fill="#e85d70"/>
  <polygon points="856,270 844,252 868,252" fill="#dc4b60"/>
  <line x1="904" y1="336" x2="904" y2="404" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="888" y="350" width="32" height="42" rx="6" fill="#df5c6c"/>
  <circle cx="904" cy="350" r="16" fill="#dc2626"/>
  <text x="899" y="356" class="body" fill="#ffffff">1</text>
  <line x1="952" y1="368" x2="952" y2="436" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="936" y="382" width="32" height="42" rx="6" fill="#df5c6c"/>
  <line x1="1000" y1="400" x2="1000" y2="468" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="984" y="414" width="32" height="42" rx="6" fill="#df5c6c"/>
  <circle cx="1000" cy="414" r="16" fill="#16a34a"/>
  <text x="995" y="420" class="body" fill="#ffffff">2</text>
  <polygon points="856,236 844,220 868,220" fill="#ef4444"/>
  <polygon points="1000,470 988,486 1012,486" fill="#ef4444"/>
  <rect x="828" y="260" width="152" height="28" rx="14" fill="#fff0f0" stroke="#efb4b4"/>
  <text x="846" y="279" class="small">Strong Short</text>
  <text x="926" y="520" class="small">약세 다이버전스</text>

  <text x="716" y="626" class="body">숏 전략</text>
  <text x="716" y="654" class="small">1. `비정상 과매수 캔들` + 약세 다이버전스 확인</text>
  <text x="716" y="676" class="small">2. `약세 ATR 배경` 또는 `Strong Short`에서 숏 매도</text>
  <text x="716" y="698" class="small">3. 하단 지지 또는 강세 배경 전환에서 숏 매수</text>
  <text x="716" y="720" class="small">4. 비정상 고점 재회복이면 무효화</text>
</svg>
