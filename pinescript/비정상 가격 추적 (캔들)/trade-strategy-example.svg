<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 캔들 실전 전략 예시</title>
  <desc id="desc">Strong Long/Short, 유동성 스윕, 다음 봉 거래량 비율 확인까지 포함한 롱숏 전략 예시</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8ef"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .subtitle { font: 500 17px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5a6b7b; }
      .label { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #36516d; letter-spacing: 0.08em; }
      .panelTitle { font: 700 24px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .body { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #273a4d; }
      .small { font: 500 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #56687a; }
      .tiny { font: 600 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #546676; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#eef2f7"/>
  <rect x="24" y="24" width="1352" height="932" rx="28" fill="url(#bg)" stroke="#d6e0ea"/>

  <text x="60" y="86" class="title">비정상 가격 추적 (캔들) · 실전 전략 예시</text>
  <text x="60" y="118" class="subtitle">Strong 신호는 진입 후보, 스윕 다이아몬드는 다음 봉 거래량 50% 확인까지 붙은 재확인 시나리오로 해석합니다.</text>

  <rect x="60" y="152" width="610" height="710" rx="26" fill="#eef8ff" stroke="#c7dff5"/>
  <text x="96" y="190" class="label">LONG EXAMPLE</text>
  <text x="96" y="226" class="panelTitle">과매도 흡수 이후 Strong Long, 그리고 하단 스윕 재확인</text>
  <rect x="96" y="248" width="538" height="330" rx="18" fill="#ffffff" stroke="#d8e3ed"/>

  <rect x="230" y="294" width="126" height="210" rx="14" fill="#e1f0ff"/>
  <polyline points="122,354 168,380 214,430 260,470 306,430 352,396 398,350 444,326 490,298 536,276 582,256" fill="none" stroke="#f2c94c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="138" y1="370" x2="138" y2="322" stroke="#d06a5a" stroke-width="6" stroke-linecap="round"/>
  <rect x="124" y="338" width="28" height="24" rx="5" fill="#ff8c3c"/>
  <line x1="184" y1="412" x2="184" y2="338" stroke="#cf6456" stroke-width="6" stroke-linecap="round"/>
  <rect x="170" y="356" width="28" height="40" rx="5" fill="#ff9b54"/>
  <line x1="230" y1="490" x2="230" y2="350" stroke="#239dca" stroke-width="6" stroke-linecap="round"/>
  <rect x="216" y="390" width="28" height="76" rx="5" fill="#63dbff"/>
  <polygon points="230,504 218,522 242,522" fill="#69e6ff"/>
  <text x="230" y="544" class="tiny center">강세 다이버전스</text>

  <line x1="278" y1="450" x2="278" y2="372" stroke="#22965f" stroke-width="6" stroke-linecap="round"/>
  <rect x="264" y="392" width="28" height="42" rx="5" fill="#35a96f"/>
  <circle cx="278" cy="448" r="7" fill="#009100"/>
  <rect x="262" y="434" width="78" height="64" rx="10" fill="#009100" opacity="0.20" stroke="#009100" stroke-width="2"/>
  <text x="352" y="462" class="tiny">Strong Long</text>
  <text x="352" y="484" class="tiny">저가~종가 기준봉 박스</text>

  <line x1="422" y1="424" x2="422" y2="510" stroke="#00ff00" stroke-width="6" stroke-linecap="round"/>
  <rect x="408" y="438" width="28" height="58" rx="5" fill="#00ff00"/>
  <text x="454" y="442" class="tiny">하단 스윕 음봉</text>

  <line x1="470" y1="438" x2="470" y2="356" stroke="#31ad63" stroke-width="6" stroke-linecap="round"/>
  <rect x="456" y="378" width="28" height="46" rx="5" fill="#3acb76"/>
  <polygon points="470,520 458,538 482,538" fill="#00ff00"/>
  <rect x="454" y="378" width="96" height="78" rx="10" fill="#00ff00" opacity="0.18" stroke="#00ff00" stroke-width="2"/>
  <text x="560" y="396" class="tiny">밝은 초록 다이아몬드</text>
  <text x="560" y="418" class="tiny">다음 양봉 + 거래량 50% 이상</text>

  <text x="96" y="620" class="body">롱 전략 흐름</text>
  <text x="96" y="650" class="small">1. 비정상 과매도 캔들과 강세 다이버전스가 먼저 나와 저점 흡수 자리를 만듭니다.</text>
  <text x="96" y="674" class="small">2. 강세 배경, 총 거래량 &gt; 10MA, buyVolume &gt; sellVolume이 겹치면 Strong Long 후보로 봅니다.</text>
  <text x="96" y="698" class="small">3. 이후 강세 박스 하단을 한 번 스윕하는 음봉이 나오더라도, 다음 양봉 거래량이 이전 스윕 봉의 50% 이상이면 재확인 다이아몬드로 해석합니다.</text>
  <text x="96" y="722" class="small">4. 상단 저항, 약세 배경 전환, 직전 고점 부근에서는 분할 청산을 우선합니다.</text>
  <text x="96" y="746" class="small">5. Strong 박스와 스윕 박스를 모두 잃고 안착하면 롱 시나리오는 무효화합니다.</text>

  <rect x="96" y="776" width="538" height="56" rx="16" fill="#ffffff" stroke="#d3e4ef"/>
  <text x="116" y="811" class="small">롱 요약: 어두운 녹색 원은 첫 진입 후보, 밝은 초록 다이아몬드는 스윕 이후 재확인 후보</text>

  <rect x="730" y="152" width="610" height="710" rx="26" fill="#fff1f3" stroke="#efc5cb"/>
  <text x="766" y="190" class="label">SHORT EXAMPLE</text>
  <text x="766" y="226" class="panelTitle">과매수 분산 이후 Strong Short, 그리고 상단 스윕 재확인</text>
  <rect x="766" y="248" width="538" height="330" rx="18" fill="#ffffff" stroke="#d8e3ed"/>

  <rect x="1012" y="280" width="126" height="210" rx="14" fill="#ffe5e5"/>
  <polyline points="792,272 838,254 884,278 930,320 976,362 1022,406 1068,432 1114,450 1160,436 1206,396 1252,352" fill="none" stroke="#f2c94c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="808" y1="310" x2="808" y2="262" stroke="#d27a42" stroke-width="6" stroke-linecap="round"/>
  <rect x="794" y="276" width="28" height="24" rx="5" fill="#ff8c3c"/>
  <line x1="854" y1="330" x2="854" y2="252" stroke="#d66f46" stroke-width="6" stroke-linecap="round"/>
  <rect x="840" y="266" width="28" height="44" rx="5" fill="#ffa35c"/>
  <line x1="900" y1="276" x2="900" y2="410" stroke="#c95d4e" stroke-width="6" stroke-linecap="round"/>
  <rect x="886" y="294" width="28" height="72" rx="5" fill="#ff8a45"/>
  <polygon points="900,246 888,228 912,228" fill="#ff8c00"/>
  <text x="900" y="214" class="tiny center">약세 다이버전스</text>

  <line x1="1028" y1="360" x2="1028" y2="438" stroke="#c52828" stroke-width="6" stroke-linecap="round"/>
  <rect x="1014" y="374" width="28" height="44" rx="5" fill="#da4141"/>
  <circle cx="1028" cy="358" r="7" fill="#d21919"/>
  <rect x="1012" y="374" width="86" height="66" rx="10" fill="#d21919" opacity="0.18" stroke="#d21919" stroke-width="2"/>
  <text x="1112" y="384" class="tiny">Strong Short</text>
  <text x="1112" y="406" class="tiny">고가~종가 기준봉 박스</text>

  <line x1="1164" y1="264" x2="1164" y2="362" stroke="#ff0000" stroke-width="6" stroke-linecap="round"/>
  <rect x="1150" y="286" width="28" height="58" rx="5" fill="#ff0000"/>
  <text x="1206" y="290" class="tiny">상단 스윕 양봉</text>

  <line x1="1212" y1="298" x2="1212" y2="392" stroke="#d43c3c" stroke-width="6" stroke-linecap="round"/>
  <rect x="1198" y="316" width="28" height="52" rx="5" fill="#ef5555"/>
  <polygon points="1212,282 1200,264 1224,264" fill="#ff0000"/>
  <rect x="1196" y="316" width="96" height="78" rx="10" fill="#ff0000" opacity="0.16" stroke="#ff0000" stroke-width="2"/>
  <text x="1108" y="466" class="tiny">밝은 빨강 다이아몬드</text>
  <text x="1108" y="488" class="tiny">다음 음봉 + 거래량 50% 이상</text>

  <text x="766" y="620" class="body">숏 전략 흐름</text>
  <text x="766" y="650" class="small">1. 비정상 과매수 캔들과 약세 다이버전스가 먼저 나와 상단 분산 자리를 만듭니다.</text>
  <text x="766" y="674" class="small">2. 약세 배경, 총 거래량 &gt; 10MA, sellVolume &gt; buyVolume이 겹치면 Strong Short 후보로 봅니다.</text>
  <text x="766" y="698" class="small">3. 이후 약세 박스 상단을 한 번 쓸어 올리는 양봉이 나오더라도, 다음 음봉 거래량이 이전 스윕 봉의 50% 이상이면 재확인 다이아몬드로 해석합니다.</text>
  <text x="766" y="722" class="small">4. 하단 지지, 강세 배경 전환, 직전 저점 부근에서는 분할 청산을 우선합니다.</text>
  <text x="766" y="746" class="small">5. Strong 박스와 스윕 박스를 모두 회복해 안착하면 숏 시나리오는 무효화합니다.</text>

  <rect x="766" y="776" width="538" height="56" rx="16" fill="#ffffff" stroke="#ecd2d6"/>
  <text x="786" y="811" class="small">숏 요약: 어두운 빨강 원은 첫 진입 후보, 밝은 빨강 다이아몬드는 스윕 이후 재확인 후보</text>

  <rect x="60" y="888" width="1280" height="44" rx="16" fill="#fff9ea" stroke="#ead8ab"/>
  <text x="700" y="916" class="small center">공통 규칙: 다이아몬드와 밝은 스윕 박스는 스윕 다음 봉이 같은 방향으로 마감하고, 거래량이 이전 스윕 봉의 50% 이상일 때만 확정됩니다.</text>
</svg>
