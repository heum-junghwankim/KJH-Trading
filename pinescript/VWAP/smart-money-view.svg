<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Auto VWAP 세력 관점 다이어그램</title>
  <desc id="desc">세션 VWAP, 최근 거래일 VWAP, Band #1과 Band #2를 Auto VWAP 기준으로 요약한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#f9fff4"/>
    </linearGradient>
    <linearGradient id="sessionFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfff3"/>
      <stop offset="100%" stop-color="#dff9ea"/>
    </linearGradient>
    <linearGradient id="rollingFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#e7fbff"/>
    </linearGradient>
    <linearGradient id="bandFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7e9"/>
      <stop offset="100%" stop-color="#fff1da"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #122033; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #546373; }
      .cardTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .sectionLabel { font: 700 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #21405b; letter-spacing: 0.08em; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #243648; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #4c5d6d; }
      .axis { font: 500 12px 'Menlo','Consolas',monospace; fill: #67788a; }
      .note { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #53411c; }
      .mono { font: 700 15px 'Menlo','Consolas',monospace; fill: #0f5132; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#edf2f7"/>
  <rect x="24" y="24" width="1552" height="852" rx="28" fill="url(#bg)" stroke="#d7e0ea"/>

  <text x="60" y="82" class="title">Auto VWAP · 세력 관점</text>
  <text x="60" y="114" class="subtitle">핵심은 평균 체결 단가 위에서 끌고 가는지, 아래로 눌러 놓는지, 그리고 밴드 이탈이 확장인지 과열인지 구분하는 것입니다</text>

  <rect x="60" y="150" width="500" height="300" rx="24" fill="url(#sessionFill)" stroke="#b7e6c8"/>
  <text x="92" y="190" class="sectionLabel">SESSION MODE</text>
  <text x="92" y="224" class="cardTitle">현재 세션 평균 단가</text>
  <rect x="92" y="246" width="196" height="168" rx="18" fill="#ffffff" opacity="0.86" stroke="#cfe8d7"/>
  <line x1="114" y1="372" x2="266" y2="372" stroke="#e4edf4"/>
  <polyline points="114,346 140,336 166,326 192,332 218,316 244,304 270,292" fill="none" stroke="#d1d5db" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="114" y1="334" x2="270" y2="334" stroke="#00d84f" stroke-width="4"/>
  <line x1="114" y1="306" x2="270" y2="306" stroke="#00d84f" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="114" y1="362" x2="270" y2="362" stroke="#00d84f" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="124" y="286" class="axis">Upper Band #1</text>
  <text x="124" y="328" class="mono">VWAP</text>
  <text x="124" y="398" class="axis">현재 세션만 표시</text>
  <text x="318" y="274" class="body">세력 해석</text>
  <text x="318" y="302" class="small">VWAP 위에서 눌림을 계속 흡수하면</text>
  <text x="318" y="324" class="small">당일 매수 쪽이 평균 단가를 지키는 구조</text>
  <text x="318" y="360" class="body">실전 포인트</text>
  <text x="318" y="388" class="small">VWAP 재회복은 방향 복귀 후보</text>
  <text x="318" y="410" class="small">VWAP 아래 고정은 반등 매도 후보</text>

  <g transform="translate(-80 0)">
    <rect x="640" y="150" width="500" height="300" rx="24" fill="url(#rollingFill)" stroke="#c4d8ef"/>
    <text x="672" y="190" class="sectionLabel">RECENT TRADING DAYS</text>
    <text x="672" y="224" class="cardTitle">최근 거래일 롤링 비용대</text>
    <rect x="672" y="246" width="196" height="168" rx="18" fill="#ffffff" opacity="0.86" stroke="#d5e3f2"/>
    <line x1="692" y1="300" x2="852" y2="300" stroke="#7c3aed" stroke-width="2" opacity="0.18"/>
    <line x1="704" y1="250" x2="704" y2="396" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="744" y1="250" x2="744" y2="396" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="784" y1="250" x2="784" y2="396" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="824" y1="250" x2="824" y2="396" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="692" y1="334" x2="852" y2="334" stroke="#00d84f" stroke-width="4"/>
    <polyline points="692,360 718,354 744,346 770,340 796,336 822,332 848,328" fill="none" stroke="#9ca3af" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="704" y="286" class="axis">최근 5거래일 누적 구간 예시</text>
    <text x="704" y="360" class="mono">롤링 VWAP</text>
    <text x="898" y="274" class="body">세력 해석</text>
    <text x="898" y="302" class="small">최근 며칠 비용대를 회복하면</text>
    <text x="898" y="324" class="small">단기 스윙 참여자 평균 단가 위 복귀</text>
    <text x="898" y="360" class="body">실전 포인트</text>
    <text x="898" y="388" class="small">새 거래일마다 기준 구간이 자동 이동</text>
    <text x="898" y="410" class="small">비용대 유지 여부를 계속 새로 확인</text>
  </g>

  <rect x="60" y="490" width="1080" height="280" rx="26" fill="url(#bandFill)" stroke="#edd8a7"/>
  <text x="94" y="530" class="sectionLabel">BAND INTERPRETATION</text>
  <text x="94" y="566" class="cardTitle">Band #1은 1차 확장, Band #2는 더 큰 이탈 구간</text>

  <rect x="94" y="598" width="312" height="112" rx="20" fill="#ffffff" stroke="#e4d9c0"/>
  <text x="118" y="634" class="body">1. VWAP 근처</text>
  <text x="118" y="662" class="small">평균 단가 공방 구간</text>
  <text x="118" y="684" class="small">방향보다 수급 균형을 먼저 확인</text>

  <rect x="444" y="598" width="312" height="112" rx="20" fill="#ffffff" stroke="#e4d9c0"/>
  <text x="468" y="634" class="body">2. Band #1</text>
  <text x="468" y="662" class="small">정상 추세 확장 또는 첫 과열 후보</text>
  <text x="468" y="684" class="small">유지되면 추세, 실패하면 평균 회귀 가능성</text>

  <g transform="translate(-80 0)">
    <rect x="794" y="598" width="312" height="112" rx="20" fill="#ffffff" stroke="#e4d9c0"/>
    <text x="818" y="634" class="body">3. Band #2</text>
    <text x="818" y="662" class="small">강한 가속 또는 단기 과열/과매도</text>
    <text x="818" y="684" class="small">도달보다 도달 뒤 유지/실패가 더 중요</text>
  </g>

  <text x="94" y="744" class="note">핵심: VWAP은 기준 단가, Band #1은 확장, Band #2는 과확장 감시로 나눠 보면 가장 단순합니다</text>
</svg>
