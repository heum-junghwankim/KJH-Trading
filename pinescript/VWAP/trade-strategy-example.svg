<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="880" viewBox="0 0 1700 880" role="img" aria-labelledby="title desc">
  <title id="title">Auto VWAP 롱숏 전략 예시</title>
  <desc id="desc">VWAP 회복 롱과 VWAP 이탈 숏을 Auto VWAP 기준으로 표현한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff9f2"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #14263a; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #58697b; }
      .panelTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .label { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2e4b69; letter-spacing: 0.06em; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #273a4d; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #56687a; }
      .axis { font: 500 12px 'Menlo','Consolas',monospace; fill: #68798a; }
    </style>
  </defs>

  <rect width="1700" height="880" fill="#edf2f7"/>
  <rect x="24" y="24" width="1652" height="832" rx="28" fill="url(#bg)" stroke="#d6e0ea"/>
  <text x="60" y="82" class="title">Auto VWAP · 실전 롱/숏 전략 예시</text>
  <text x="60" y="114" class="subtitle">핵심은 VWAP 회복 또는 재이탈 뒤, 첫 눌림/반등이 평균 단가를 다시 지키는지 확인하는 것입니다</text>

  <rect x="60" y="150" width="540" height="640" rx="26" fill="#ecfff3" stroke="#bfe7cf"/>
  <text x="96" y="190" class="label">LONG SETUP</text>
  <text x="96" y="226" class="panelTitle">VWAP 회복 뒤 눌림 매수</text>
  <rect x="96" y="250" width="468" height="304" rx="20" fill="#ffffff" stroke="#d7e3ed"/>
  <line x1="126" y1="310" x2="534" y2="310" stroke="#00d84f" stroke-width="4"/>
  <line x1="126" y1="270" x2="534" y2="270" stroke="#00d84f" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="126" y1="350" x2="534" y2="350" stroke="#00d84f" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="126" y1="242" x2="126" y2="528" stroke="#eef2f6"/>
  <line x1="206" y1="242" x2="206" y2="528" stroke="#eef2f6"/>
  <line x1="286" y1="242" x2="286" y2="528" stroke="#eef2f6"/>
  <line x1="366" y1="242" x2="366" y2="528" stroke="#eef2f6"/>
  <line x1="446" y1="242" x2="446" y2="528" stroke="#eef2f6"/>
  <polyline points="130,390 162,408 194,420 226,360 258,322 290,296 322,314 354,300 386,280 418,256 450,238 482,226 514,214" fill="none" stroke="#d1d5db" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="258" cy="322" r="11" fill="#16a34a"/>
  <circle cx="354" cy="300" r="11" fill="#16a34a"/>
  <circle cx="482" cy="226" r="11" fill="#f59e0b"/>
  <rect x="226" y="274" width="152" height="28" rx="14" fill="#ecfff3" stroke="#bfe7cf"/>
  <text x="246" y="293" class="small">1. VWAP 회복</text>
  <rect x="318" y="320" width="166" height="28" rx="14" fill="#ecfff3" stroke="#bfe7cf"/>
  <text x="338" y="339" class="small">2. 눌림 지지 확인</text>
  <rect x="424" y="186" width="112" height="28" rx="14" fill="#fff7df" stroke="#efd07a"/>
  <text x="442" y="205" class="small">3. 분할 청산</text>
  <text x="540" y="274" class="axis">Upper #1</text>
  <text x="540" y="314" class="axis">VWAP</text>
  <text x="540" y="354" class="axis">Lower #1</text>
  <text x="96" y="606" class="body">롱 전략</text>
  <text x="96" y="634" class="small">1. 가격이 VWAP 아래에서 위로 복귀하는지 확인</text>
  <text x="96" y="656" class="small">2. 첫 눌림이 VWAP 또는 Lower Band #1 위에서 멈추는지 확인</text>
  <text x="96" y="678" class="small">3. Upper Band #1 도달은 확장 확인, Upper Band #2는 과확장 감시</text>
  <text x="96" y="700" class="small">4. 다시 VWAP 아래로 밀리면 시나리오 약화</text>
  <rect x="328" y="566" width="220" height="34" rx="17" fill="#ecfff3" stroke="#bfe7cf"/>
  <text x="348" y="588" class="small">매수: VWAP 회복 뒤 첫 지지 확인</text>
  <rect x="334" y="610" width="214" height="34" rx="17" fill="#fff7df" stroke="#efd07a"/>
  <text x="354" y="632" class="small">청산: Upper Band 확장 둔화 확인</text>

  <g transform="translate(-80 0)">
    <rect x="680" y="150" width="540" height="640" rx="26" fill="#fff0f2" stroke="#efc3c9"/>
    <text x="716" y="190" class="label">SHORT SETUP</text>
    <text x="716" y="226" class="panelTitle">VWAP 재이탈 뒤 반등 매도</text>
    <rect x="716" y="250" width="468" height="304" rx="20" fill="#ffffff" stroke="#d7e3ed"/>
    <line x1="746" y1="310" x2="1154" y2="310" stroke="#00d84f" stroke-width="4"/>
    <line x1="746" y1="270" x2="1154" y2="270" stroke="#00d84f" stroke-width="3" stroke-dasharray="8 8"/>
    <line x1="746" y1="350" x2="1154" y2="350" stroke="#00d84f" stroke-width="3" stroke-dasharray="8 8"/>
    <line x1="746" y1="242" x2="746" y2="528" stroke="#eef2f6"/>
    <line x1="826" y1="242" x2="826" y2="528" stroke="#eef2f6"/>
    <line x1="906" y1="242" x2="906" y2="528" stroke="#eef2f6"/>
    <line x1="986" y1="242" x2="986" y2="528" stroke="#eef2f6"/>
    <line x1="1066" y1="242" x2="1066" y2="528" stroke="#eef2f6"/>
    <polyline points="750,230 782,242 814,258 846,296 878,334 910,320 942,332 974,354 1006,376 1038,392 1070,408 1102,422 1134,438" fill="none" stroke="#d1d5db" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="846" cy="296" r="11" fill="#dc2626"/>
    <circle cx="942" cy="332" r="11" fill="#dc2626"/>
    <circle cx="1102" cy="422" r="11" fill="#16a34a"/>
    <rect x="814" y="236" width="156" height="28" rx="14" fill="#fff0f2" stroke="#efc3c9"/>
    <text x="836" y="255" class="small">1. VWAP 재이탈</text>
    <rect x="906" y="282" width="176" height="28" rx="14" fill="#fff0f2" stroke="#efc3c9"/>
    <text x="928" y="301" class="small">2. 반등 저항 확인</text>
    <rect x="1030" y="438" width="112" height="28" rx="14" fill="#ebfff3" stroke="#bfe7cf"/>
    <text x="1048" y="457" class="small">3. 분할 청산</text>
    <text x="1160" y="274" class="axis">Upper #1</text>
    <text x="1160" y="314" class="axis">VWAP</text>
    <text x="1160" y="354" class="axis">Lower #1</text>
    <text x="716" y="606" class="body">숏 전략</text>
    <text x="716" y="634" class="small">1. 가격이 VWAP 위에서 아래로 다시 밀리는지 확인</text>
    <text x="716" y="656" class="small">2. 되돌림 반등이 VWAP 또는 Upper Band #1 아래에서 막히는지 확인</text>
    <text x="716" y="678" class="small">3. Lower Band #1은 하락 진행 확인, Lower Band #2는 과확장 감시</text>
    <text x="716" y="700" class="small">4. 다시 VWAP 위로 복귀하면 시나리오 약화</text>
    <rect x="970" y="566" width="184" height="34" rx="17" fill="#fff0f2" stroke="#efc3c9"/>
    <text x="990" y="588" class="small">매도: VWAP 재이탈 뒤 저항 확인</text>
    <rect x="978" y="610" width="176" height="34" rx="17" fill="#ebfff3" stroke="#bfe7cf"/>
    <text x="998" y="632" class="small">청산: Lower Band 확장 둔화 확인</text>
  </g>
</svg>
