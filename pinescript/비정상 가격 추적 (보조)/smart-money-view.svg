<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 보조 세력 관점 다이어그램</title>
  <desc id="desc">cRSI와 MFI 괴리, Reversal Risk H/L 라벨을 세력 관점으로 해석한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f3f8ff"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #122033; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #556779; }
      .cardTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .label { font: 700 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #315171; letter-spacing: 0.08em; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #25384a; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #4d6070; }
      .mono { font: 700 16px 'Menlo','Consolas',monospace; fill: #846800; }
      .monoBlue { font: 700 16px 'Menlo','Consolas',monospace; fill: #205b9c; }
      .note { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #6d4e0d; }
    </style>
  </defs>

  <rect width="1600" height="920" fill="#eef2f8"/>
  <rect x="24" y="24" width="1552" height="872" rx="28" fill="url(#bg)" stroke="#d9e2ec"/>

  <text x="60" y="82" class="title">비정상 가격 추적 (보조) · 세력 관점</text>
  <text x="60" y="114" class="subtitle">배경은 괴리 경고, H/L 라벨은 조건이 압축된 반전 위험 신호로 읽습니다</text>

  <rect x="60" y="152" width="500" height="370" rx="24" fill="#fff6d8" stroke="#f1d888"/>
  <text x="92" y="190" class="label">YELLOW GAP</text>
  <text x="92" y="224" class="cardTitle">cRSI &gt; MFI</text>
  <rect x="92" y="246" width="170" height="230" rx="18" fill="#ffffff" opacity="0.84" stroke="#f0df9b"/>
  <text x="112" y="276" class="mono">price momentum</text>
  <text x="112" y="298" class="mono">&gt; money flow</text>
  <circle cx="138" cy="346" r="24" fill="#ffe58f" stroke="#e0c15c"/>
  <text x="130" y="352" class="body">1</text>
  <line x1="138" y1="370" x2="138" y2="410" stroke="#e0c15c" stroke-width="3"/>
  <polygon points="138,420 130,406 146,406" fill="#e0c15c"/>
  <circle cx="138" cy="446" r="24" fill="#ff9da5" stroke="#d05360"/>
  <text x="130" y="452" class="body">2</text>
  <text x="292" y="280" class="body">세력 해석</text>
  <text x="292" y="308" class="small">가격이 자금 흐름보다 먼저 달리는 구간</text>
  <text x="292" y="330" class="small">추격 매수만 붙고 실수요는 약할 수 있음</text>
  <text x="292" y="366" class="body">붉은색 Bearish H/L</text>
  <text x="292" y="394" class="small">업쓰러스트, 불트랩, 분산 가능성 경고</text>
  <text x="292" y="430" class="body">예상 움직임</text>
  <text x="292" y="458" class="small">전고 돌파 연출 후 되밀림</text>
  <text x="292" y="480" class="small">고가 미유지 시 위험 증가</text>

  <g transform="translate(-80 0)">
    <rect x="640" y="152" width="500" height="370" rx="24" fill="#eaf4ff" stroke="#bfdaf7"/>
    <text x="672" y="190" class="label">BLUE GAP</text>
    <text x="672" y="224" class="cardTitle">MFI &gt; cRSI</text>
    <rect x="672" y="246" width="170" height="230" rx="18" fill="#ffffff" opacity="0.84" stroke="#d3e3f4"/>
    <text x="692" y="276" class="monoBlue">money flow</text>
    <text x="692" y="298" class="monoBlue">&gt; price momentum</text>
    <circle cx="718" cy="346" r="24" fill="#9fd0ff" stroke="#4b8fd6"/>
    <text x="710" y="352" class="body">1</text>
    <line x1="718" y1="370" x2="718" y2="410" stroke="#4b8fd6" stroke-width="3"/>
    <polygon points="718,420 710,406 726,406" fill="#4b8fd6"/>
    <circle cx="718" cy="446" r="24" fill="#7db8ff" stroke="#316fbe"/>
    <text x="710" y="452" class="body">2</text>
    <text x="872" y="280" class="body">세력 해석</text>
    <text x="872" y="308" class="small">가격은 눌렸지만 자금 흐름이 먼저 버팀</text>
    <text x="872" y="330" class="small">강제 청산 물량을 아래에서 받을 수 있음</text>
    <text x="872" y="366" class="body">파란색 Bullish H/L</text>
    <text x="872" y="394" class="small">스탑런 회수, 바닥 흡수, 숏트랩 가능성 경고</text>
    <text x="872" y="430" class="body">예상 움직임</text>
    <text x="872" y="458" class="small">저점 이탈 연출 후 반등</text>
    <text x="872" y="480" class="small">저가 회복 속도가 빠를수록 강함</text>
  </g>

  <rect x="60" y="560" width="1080" height="244" rx="24" fill="#ffffff" stroke="#d2dbe6"/>
  <text x="94" y="602" class="cardTitle">읽는 순서</text>

  <rect x="94" y="636" width="312" height="118" rx="18" fill="#fffdf4" stroke="#ece3ba"/>
  <text x="118" y="670" class="body">1. 배경 = 경고 구간</text>
  <text x="118" y="698" class="small">괴리가 생겼지만</text>
  <text x="118" y="720" class="small">아직 전환 조건은 부족할 수 있음</text>

  <rect x="444" y="636" width="312" height="118" rx="18" fill="#f5f8ff" stroke="#d7e0f2"/>
  <text x="468" y="670" class="body">2. H = 강한 경고</text>
  <text x="468" y="698" class="small">다음 봉이 신호 봉</text>
  <text x="468" y="720" class="small">고점·저점을 못 지키면 함정 해석 강화</text>

  <g transform="translate(-80 0)">
    <rect x="794" y="636" width="312" height="118" rx="18" fill="#f8fbff" stroke="#dce6f1"/>
    <text x="818" y="670" class="body">3. L = 약한 경고</text>
    <text x="818" y="698" class="small">단독 진입 근거보다</text>
    <text x="818" y="720" class="small">추격 자제 신호로 활용</text>
  </g>

  <text x="60" y="850" class="note">핵심: 노란 배경은 위에서 받는 유동성, 파란 배경은 아래에서 받아내는 유동성을 먼저 의심합니다</text>
</svg>
