<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="920" viewBox="0 0 1700 920" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 보조 롱숏 전략 예시</title>
  <desc id="desc">cRSI와 MFI 보조지표에서 Bullish H와 Bearish H를 이용해 진입과 청산을 설명하는 가상 차트</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f3f8ff"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #15263a; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #58697b; }
      .panelTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .label { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2e4b69; letter-spacing: 0.06em; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #273a4d; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #56687a; }
      .axis { font: 500 12px 'Menlo','Consolas',monospace; fill: #68798a; }
    </style>
  </defs>
  <rect width="1700" height="920" fill="#edf2f7"/>
  <rect x="24" y="24" width="1652" height="872" rx="28" fill="url(#bg)" stroke="#d6e0ea"/>
  <text x="60" y="82" class="title">비정상 가격 추적 (보조) · 실전 롱/숏 전략 예시</text>
  <text x="60" y="114" class="subtitle">이 지표는 단독 진입보다 추격 금지와 반대 방향 준비에 강합니다. H는 강한 경고, L은 약한 경고로 씁니다.</text>

  <rect x="60" y="150" width="540" height="690" rx="26" fill="#eef8ff" stroke="#c7dff5"/>
  <text x="96" y="190" class="label">LONG SETUP</text>
  <text x="96" y="226" class="panelTitle">파란 배경 + Bullish H 뒤 롱 매수</text>
  <rect x="96" y="250" width="468" height="204" rx="18" fill="#ffffff" stroke="#d7e3ed"/>
  <polyline points="126,388 172,364 218,348 264,356 310,382 356,404 402,394 448,360 494,330 540,308" fill="none" stroke="#f2c94c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="136" y1="424" x2="136" y2="374" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="120" y="388" width="32" height="26" rx="6" fill="#df5c6c"/>
  <line x1="184" y1="404" x2="184" y2="346" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="168" y="360" width="32" height="34" rx="6" fill="#df5c6c"/>
  <line x1="232" y1="438" x2="232" y2="350" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="216" y="374" width="32" height="48" rx="6" fill="#df5c6c"/>
  <line x1="280" y1="400" x2="280" y2="344" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="264" y="358" width="32" height="30" rx="6" fill="#20a36c"/>
  <line x1="328" y1="372" x2="328" y2="320" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="312" y="336" width="32" height="28" rx="6" fill="#20a36c"/>
  <line x1="376" y1="350" x2="376" y2="294" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="360" y="308" width="32" height="32" rx="6" fill="#20a36c"/>
  <circle cx="232" cy="438" r="18" fill="#2563eb"/>
  <text x="226" y="445" class="body" fill="#ffffff">H</text>
  <circle cx="328" cy="336" r="18" fill="#16a34a"/>
  <text x="322" y="343" class="body" fill="#ffffff">1</text>
  <circle cx="494" cy="330" r="18" fill="#f59e0b"/>
  <text x="488" y="337" class="body" fill="#ffffff">2</text>

  <rect x="96" y="474" width="468" height="168" rx="18" fill="#f6fbff" stroke="#d4e5f5"/>
  <rect x="110" y="486" width="440" height="144" rx="14" fill="#edf6ff"/>
  <line x1="110" y1="522" x2="550" y2="522" stroke="#dce8f4"/>
  <line x1="110" y1="558" x2="550" y2="558" stroke="#dce8f4"/>
  <line x1="110" y1="594" x2="550" y2="594" stroke="#dce8f4"/>
  <rect x="164" y="488" width="120" height="140" fill="#deefff"/>
  <polyline points="122,566 166,590 210,600 254,578 298,552 342,530 386,518 430,508 474,516 518,526" fill="none" stroke="#f2cf3a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="122,600 166,570 210,548 254,556 298,548 342,536 386,530 430,528 474,536 518,544" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="194" y="502" width="72" height="28" rx="14" fill="#d6ebff" stroke="#9fc7f5"/>
  <text x="206" y="520" class="small">Bullish H</text>

  <text x="96" y="676" class="body">롱 전략</text>
  <text x="96" y="704" class="small">1. 가격 저점 스윕 + `파란 배경` 확인</text>
  <text x="96" y="726" class="small">2. `Bullish H` 뒤 확인 봉에서 롱 매수</text>
  <text x="96" y="748" class="small">3. 위쪽에서 `Bearish H/L` 보이면 롱 매도</text>
  <text x="96" y="770" class="small">4. 신호 봉 저가 이탈이면 무효화</text>

  <g transform="translate(-80 0)">
    <rect x="680" y="150" width="540" height="690" rx="26" fill="#fff7df" stroke="#eed38b"/>
    <text x="716" y="190" class="label">SHORT SETUP</text>
    <text x="716" y="226" class="panelTitle">노란 배경 + Bearish H 뒤 숏 매도</text>
    <rect x="716" y="250" width="468" height="204" rx="18" fill="#ffffff" stroke="#d7e3ed"/>
    <polyline points="746,330 792,312 838,296 884,286 930,300 976,320 1022,350 1068,378 1114,396 1160,410" fill="none" stroke="#f2c94c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="760" y1="346" x2="760" y2="292" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
