    <line x1="856" y1="300" x2="856" y2="236" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
    <rect x="840" y="252" width="32" height="38" rx="6" fill="#20a36c"/>
    <line x1="904" y1="266" x2="904" y2="356" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="888" y="282" width="32" height="52" rx="6" fill="#df5c6c"/>
    <line x1="952" y1="310" x2="952" y2="384" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="936" y="326" width="32" height="42" rx="6" fill="#df5c6c"/>
    <line x1="1000" y1="342" x2="1000" y2="416" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="984" y="358" width="32" height="42" rx="6" fill="#df5c6c"/>
    <circle cx="856" cy="236" r="18" fill="#dc2626"/>
    <text x="850" y="243" class="body" fill="#ffffff">H</text>
    <circle cx="904" cy="282" r="18" fill="#dc2626"/>
    <text x="898" y="289" class="body" fill="#ffffff">1</text>
    <circle cx="1070" cy="378" r="18" fill="#16a34a"/>
    <text x="1064" y="385" class="body" fill="#ffffff">2</text>

    <rect x="716" y="474" width="468" height="168" rx="18" fill="#fffdf4" stroke="#efe1ba"/>
    <rect x="730" y="486" width="440" height="144" rx="14" fill="#fff5cf"/>
    <line x1="730" y1="522" x2="1170" y2="522" stroke="#eee1b8"/>
    <line x1="730" y1="558" x2="1170" y2="558" stroke="#eee1b8"/>
    <line x1="730" y1="594" x2="1170" y2="594" stroke="#eee1b8"/>
    <rect x="820" y="488" width="140" height="140" fill="#fff1a6" opacity="0.9"/>
    <polyline points="742,542 786,530 830,510 874,492 918,500 962,516 1006,536 1050,556 1094,574 1138,592" fill="none" stroke="#f2cf3a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="742,574 786,580 830,568 874,550 918,546 962,552 1006,564 1050,578 1094,588 1138,598" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="852" y="500" width="78" height="28" rx="14" fill="#ffe7aa" stroke="#e7c75a"/>
    <text x="864" y="518" class="small">Bearish H</text>

    <text x="716" y="676" class="body">숏 전략</text>
    <text x="716" y="704" class="small">1. 가격 고점 스윕 + `노란 배경` 확인</text>
    <text x="716" y="726" class="small">2. `Bearish H` 뒤 확인 봉에서 숏 매도</text>
    <text x="716" y="748" class="small">3. 아래에서 `Bullish H/L` 보이면 숏 매수</text>
    <text x="716" y="770" class="small">4. 신호 봉 고가 회복이면 무효화</text>
  </g>
</svg>
