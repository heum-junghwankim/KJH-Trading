<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="940" viewBox="0 0 1200 940" role="img" aria-labelledby="title desc">
  <title id="title">거래량 압력 추적 세력 관점 다이어그램</title>
  <desc id="desc">정렬과 비정상 거래량의 조합으로 추세 지속, 흡수, 함정 가능성을 요약한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8f1"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #122033; }
      .subtitle { font: 500 17px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #556577; }
      .cardTitle { font: 700 23px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .label { font: 700 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #32506f; letter-spacing: 0.08em; }
      .body { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #26384b; }
      .small { font: 500 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #4d6070; }
      .accent { font: 700 16px 'Menlo','Consolas',monospace; fill: #0d5f3c; }
      .accentBear { font: 700 16px 'Menlo','Consolas',monospace; fill: #7c3aed; }
      .warn { font: 700 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #7d5b12; }
    </style>
  </defs>

  <rect width="1200" height="940" fill="#eef3f8"/>
  <rect x="24" y="24" width="1152" height="892" rx="28" fill="url(#bg)" stroke="#dbe3ec"/>

  <text x="60" y="82" class="title">거래량 압력 추적 · 세력 관점</text>
  <text x="60" y="114" class="subtitle">정렬과 비정상 체결 압력이 같은 방향이면 추세 지속, 반대면 흡수 또는 함정 가능성을 먼저 봅니다</text>

  <rect x="60" y="150" width="500" height="290" rx="24" fill="#ebfff3" stroke="#c3e9d0"/>
  <text x="92" y="188" class="label">ALIGNED PRESSURE</text>
  <text x="92" y="222" class="cardTitle">녹색 배경 + 연두 비정상 매수</text>
  <rect x="92" y="246" width="178" height="154" rx="18" fill="#ffffff" opacity="0.82" stroke="#d6eadb"/>
  <text x="112" y="274" class="accent">trend up</text>
  <rect x="112" y="348" width="18" height="30" rx="5" fill="#95d5b2"/>
  <rect x="142" y="324" width="18" height="54" rx="5" fill="#52b788"/>
  <rect x="172" y="292" width="18" height="86" rx="5" fill="#2d9d6f"/>
  <rect x="202" y="264" width="18" height="114" rx="5" fill="#11a35f"/>
  <polyline points="112,314 144,306 176,312 208,286 240,272" fill="none" stroke="#159a64" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="298" y="274" class="body">세력 해석</text>
  <text x="298" y="302" class="small">눌림에서 매물을 흡수하고</text>
  <text x="298" y="324" class="small">다시 위로 밀 가능성이 높은 조합</text>
  <text x="298" y="360" class="body">예상 움직임</text>
  <text x="298" y="388" class="small">저점 방어 -> 직전 고점 재도전</text>
  <text x="298" y="410" class="small">돌파 시도와 추세 재가속 가능성</text>

  <rect x="640" y="150" width="500" height="290" rx="24" fill="#f6efff" stroke="#dbc6f3"/>
  <text x="672" y="188" class="label">ALIGNED PRESSURE</text>
  <text x="672" y="222" class="cardTitle">보라색 배경 + 빨강 비정상 매도</text>
  <rect x="672" y="246" width="178" height="154" rx="18" fill="#ffffff" opacity="0.82" stroke="#e7d9f4"/>
  <text x="692" y="274" class="accentBear">trend down</text>
  <rect x="692" y="264" width="18" height="114" rx="5" fill="#d04b5e"/>
  <rect x="722" y="292" width="18" height="86" rx="5" fill="#d96a78"/>
  <rect x="752" y="324" width="18" height="54" rx="5" fill="#e78d97"/>
  <rect x="782" y="348" width="18" height="30" rx="5" fill="#f1b2b8"/>
  <polyline points="692,272 724,286 756,304 788,320 820,336" fill="none" stroke="#cb4456" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="878" y="274" class="body">세력 해석</text>
  <text x="878" y="302" class="small">반등 구간에서 공급을 던지며</text>
  <text x="878" y="324" class="small">재하락을 만드는 조합</text>
  <text x="878" y="360" class="body">예상 움직임</text>
  <text x="878" y="388" class="small">반등 제한 -> 저점 재시험</text>
  <text x="878" y="410" class="small">하단 이탈 시도와 추세 지속 가능성</text>

  <rect x="60" y="478" width="500" height="290" rx="24" fill="#fff8e9" stroke="#f0d694"/>
  <text x="92" y="516" class="label">MISMATCHED PRESSURE</text>
  <text x="92" y="550" class="cardTitle">녹색 배경 + 빨강 비정상 매도</text>
  <rect x="92" y="578" width="436" height="150" rx="18" fill="#ffffff" opacity="0.86" stroke="#eadcb3"/>
  <text x="116" y="612" class="body">가능성</text>
  <text x="116" y="638" class="small">롱 청산, 눌림 테스트, 단기 손절 유도</text>
  <text x="116" y="672" class="body">확인할 것</text>
  <text x="116" y="698" class="small">다음 봉 회복 + 매수 압력 재등장 = 흡수 가능성</text>
  <text x="116" y="720" class="small">기준선 이탈 + 빨강 반복 = 분산 시작 가능성</text>

  <rect x="640" y="478" width="500" height="290" rx="24" fill="#f2ecff" stroke="#d8c8f4"/>
  <text x="672" y="516" class="label">MISMATCHED PRESSURE</text>
  <text x="672" y="550" class="cardTitle">보라색 배경 + 연두 비정상 매수</text>
  <rect x="672" y="578" width="436" height="150" rx="18" fill="#ffffff" opacity="0.86" stroke="#e2d5f5"/>
  <text x="696" y="612" class="body">가능성</text>
  <text x="696" y="638" class="small">숏 커버, 반등 함정, 바닥 훼손 후 되감기</text>
  <text x="696" y="672" class="body">확인할 것</text>
  <text x="696" y="698" class="small">고점 실패 + 매도 압력 재등장 = 반등 함정 가능성</text>
  <text x="696" y="720" class="small">정렬 전환 + 기준선 회복 = 진짜 바닥 흡수 가능성</text>

  <text x="60" y="832" class="warn">핵심: 반대색 비정상 거래량은 즉시 반전 신호보다, 누가 반대 물량을 받아내는지 테스트하는 구간으로 읽는 편이 안전합니다</text>
  <text x="60" y="864" class="small">주의: 이 지표의 Buy/Sell 압력은 봉 내부 종가 위치 기반 해석이므로, 실제 호가 체결 데이터처럼 단정하면 안 됩니다</text>
</svg>
