    <rect x="716" y="250" width="468" height="220" rx="20" fill="#ffffff" stroke="#d7e3ed"/>
    <polyline points="740,272 786,296 832,320 878,344 924,328 970,352 1016,382 1062,408 1108,430 1154,452" fill="none" stroke="#f2c94c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
