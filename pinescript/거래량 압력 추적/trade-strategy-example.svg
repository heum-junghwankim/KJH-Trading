  <rect x="354" y="316" width="32" height="34" rx="6" fill="#20a36c"/>
  <line x1="418" y1="340" x2="418" y2="282" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="402" y="296" width="32" height="34" rx="6" fill="#20a36c"/>

  <rect x="96" y="490" width="468" height="126" rx="18" fill="#f5fffa" stroke="#cbe8d6"/>
  <rect x="116" y="508" width="18" height="74" rx="6" fill="#d2d6db"/>
  <rect x="148" y="520" width="18" height="62" rx="6" fill="#c2c7ce"/>
  <rect x="180" y="536" width="18" height="46" rx="6" fill="#c2c7ce"/>
  <rect x="212" y="548" width="18" height="34" rx="6" fill="#c2c7ce"/>
  <rect x="244" y="498" width="18" height="84" rx="6" fill="#7de3a4"/>
  <rect x="276" y="520" width="18" height="62" rx="6" fill="#d2d6db"/>
  <rect x="308" y="534" width="18" height="48" rx="6" fill="#d2d6db"/>
  <rect x="340" y="548" width="18" height="34" rx="6" fill="#f3727f"/>
  <rect x="372" y="534" width="18" height="48" rx="6" fill="#d2d6db"/>
  <rect x="404" y="520" width="18" height="62" rx="6" fill="#d2d6db"/>
  <text x="96" y="642" class="body">롱 전략</text>
  <text x="96" y="670" class="small">1. 가격 눌림 뒤 `녹색 배경` 유지 확인</text>
  <text x="96" y="692" class="small">2. `연두 비정상 매수` 막대에서 롱 매수</text>
  <text x="96" y="714" class="small">3. 목표 구간에서 `빨강 비정상 매도` 나오면 롱 매도</text>
  <circle cx="253" cy="498" r="18" fill="#16a34a"/>
  <text x="247" y="505" class="body" fill="#ffffff">1</text>
  <circle cx="349" cy="548" r="18" fill="#f59e0b"/>
  <text x="343" y="555" class="body" fill="#ffffff">2</text>

  <g transform="translate(-80 0)">
    <rect x="680" y="150" width="540" height="660" rx="26" fill="#f6efff" stroke="#dbc6f3"/>
    <text x="716" y="190" class="label">SHORT SETUP</text>
