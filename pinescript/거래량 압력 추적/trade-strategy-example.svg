    <line x1="750" y1="286" x2="750" y2="344" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="734" y="300" width="32" height="34" rx="6" fill="#df5c6c"/>
    <line x1="798" y1="310" x2="798" y2="364" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
