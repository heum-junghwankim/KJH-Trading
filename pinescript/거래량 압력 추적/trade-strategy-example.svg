    <rect x="1022" y="410" width="32" height="32" rx="6" fill="#df5c6c"/>

    <rect x="716" y="490" width="468" height="126" rx="18" fill="#f7f1ff" stroke="#e1d2f5"/>
    <rect x="736" y="548" width="18" height="34" rx="6" fill="#d2d6db"/>
    <rect x="768" y="534" width="18" height="48" rx="6" fill="#d2d6db"/>
    <rect x="800" y="520" width="18" height="62" rx="6" fill="#d2d6db"/>
    <rect x="832" y="506" width="18" height="76" rx="6" fill="#ef6a79"/>
    <rect x="864" y="520" width="18" height="62" rx="6" fill="#d2d6db"/>
    <rect x="896" y="534" width="18" height="48" rx="6" fill="#d2d6db"/>
    <rect x="928" y="548" width="18" height="34" rx="6" fill="#d2d6db"/>
    <rect x="960" y="520" width="18" height="62" rx="6" fill="#7de3a4"/>
    <rect x="992" y="536" width="18" height="46" rx="6" fill="#d2d6db"/>
    <rect x="1024" y="548" width="18" height="34" rx="6" fill="#d2d6db"/>
    <text x="716" y="642" class="body">숏 전략</text>
    <text x="716" y="670" class="small">1. 반등 뒤 `보라색 배경` 유지 확인</text>
    <text x="716" y="692" class="small">2. `빨강 비정상 매도` 막대에서 숏 매도</text>
    <text x="716" y="714" class="small">3. 하단에서 `연두 비정상 매수` 나오면 숏 매수</text>
    <circle cx="841" cy="506" r="18" fill="#dc2626"/>
    <text x="835" y="513" class="body" fill="#ffffff">1</text>
    <circle cx="969" cy="520" r="18" fill="#16a34a"/>
    <text x="963" y="527" class="body" fill="#ffffff">2</text>
  </g>
</svg>
