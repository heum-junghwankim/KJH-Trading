    <line x1="846" y1="336" x2="846" y2="390" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="830" y="350" width="32" height="30" rx="6" fill="#df5c6c"/>
    <line x1="894" y1="356" x2="894" y2="310" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
    <rect x="878" y="324" width="32" height="22" rx="6" fill="#20a36c"/>
    <line x1="942" y1="330" x2="942" y2="386" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="926" y="346" width="32" height="30" rx="6" fill="#df5c6c"/>
    <line x1="990" y1="358" x2="990" y2="418" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
    <rect x="974" y="376" width="32" height="32" rx="6" fill="#df5c6c"/>
