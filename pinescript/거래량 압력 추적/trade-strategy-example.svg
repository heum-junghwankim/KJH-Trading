<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="900" viewBox="0 0 1700 900" role="img" aria-labelledby="title desc">
  <title id="title">거래량 압력 추적 롱숏 전략 예시</title>
  <desc id="desc">거래량 압력 추적 지표를 기준으로 정렬과 비정상 거래량이 맞는 자리에서 진입하고 반대 압력이 나오는 자리에서 청산하는 예시</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8f1"/>
    </linearGradient>
    <style>
      .title { font: 700 32px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #15263a; }
      .subtitle { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #58697b; }
      .panelTitle { font: 700 22px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .label { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #2e4b69; letter-spacing: 0.06em; }
      .body { font: 500 15px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #273a4d; }
      .small { font: 500 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #56687a; }
    </style>
  </defs>
  <rect width="1700" height="900" fill="#edf2f7"/>
  <rect x="24" y="24" width="1652" height="852" rx="28" fill="url(#bg)" stroke="#d6e0ea"/>
  <text x="60" y="82" class="title">거래량 압력 추적 · 실전 롱/숏 전략 예시</text>
  <text x="60" y="114" class="subtitle">가격 자리는 추세가 잡아주고, 실제 진입은 정렬과 같은 방향의 비정상 거래량이 붙을 때만 강하게 봅니다.</text>

  <rect x="60" y="150" width="540" height="660" rx="26" fill="#ecfff3" stroke="#bfe7cf"/>
  <text x="96" y="190" class="label">LONG SETUP</text>
  <text x="96" y="226" class="panelTitle">녹색 배경 + 연두 비정상 매수에서 롱</text>
  <rect x="96" y="250" width="468" height="220" rx="20" fill="#ffffff" stroke="#d7e3ed"/>
  <polyline points="120,424 166,404 212,386 258,398 304,366 350,342 396,320 442,300 488,282 534,264" fill="none" stroke="#f2c94c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="242" y="386" width="136" height="28" rx="14" fill="#dff2ff" stroke="#98c9f5"/>
  <text x="264" y="405" class="small">눌림 구간</text>
  <line x1="130" y1="432" x2="130" y2="384" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="114" y="398" width="32" height="26" rx="6" fill="#20a36c"/>
  <line x1="178" y1="410" x2="178" y2="364" stroke="#20a36c" stroke-width="6" stroke-linecap="round"/>
  <rect x="162" y="378" width="32" height="24" rx="6" fill="#20a36c"/>
  <line x1="226" y1="396" x2="226" y2="350" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
  <rect x="210" y="366" width="32" height="20" rx="6" fill="#df5c6c"/>
  <line x1="274" y1="416" x2="274" y2="356" stroke="#df5c6c" stroke-width="6" stroke-linecap="round"/>
